name: Build MinimapMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clear nuget cache
        run: dotnet nuget locals all --clear

      - name: Restore
        run: dotnet restore Minimap/MinimapMod.csproj --force --no-cache -v detailed

      - name: Build
        run: dotnet build Minimap/MinimapMod.csproj -c Release --no-restore -v detailed

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: MinimapMod
          path: Minimap/bin/Release/netstandard2.1/MinimapMod.dll
